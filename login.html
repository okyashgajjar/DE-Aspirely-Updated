<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Aspirely</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/custom.css" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/images/logo.png">

</head>
<body class="d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-glass fixed-top">
        <div class="container">
                <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">Aspirely<span class="brand-dot"></span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                </ul>
                <a class="btn btn-outline-light" href="signup.html">Sign Up</a>
            </div>
        </div>
    </nav>
</header>

<main>
    <section class="container py-5" style="max-width: 480px;">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="h4 mb-2 text-center">Welcome Back</h2>
                <p class="text-secondary text-center mb-4">Demo: demo@aspirely.com / password</p>
                <form id="loginForm" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="login_email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="login_email" required>
                        <div class="invalid-feedback">Please enter a valid email.</div>
                    </div>
                    <div class="mb-3">
                        <label for="login_password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="login_password" required>
                        <div class="invalid-feedback">Password is required.</div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-info text-white">Login</button>
                        <button type="button" class="btn btn-outline-secondary" onclick="demoLogin()">Login as Demo</button>
                    </div>
                </form>
                <p class="text-secondary mt-3 mb-0 text-center">New here? <a href="signup.html">Create an account</a></p>
            </div>
        </div>
    </section>
</main>

<footer class="py-4 bg-dark text-white-50 mt-auto">
    <div class="container d-flex justify-content-center align-items-center">&copy; 2025 Aspirely. All rights reserved.</div>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/login.js"></script>
</body>
</html>
