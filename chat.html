<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="css/custom.css" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/images/logo.png">

</head>
<body class="d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-glass fixed-top">
            <div class="container">
                <a class="navbar-brand fw-bold d-flex align-items-center" href="dashboard.html">Aspirely<span class="brand-dot"></span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navDash" aria-controls="navDash" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navDash">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link active" href="chat.html">AI Chatbot</a></li>
                        <li class="nav-item"><a class="nav-link" href="recommendations.html">Jobs</a></li>
                        <li class="nav-item"><a class="nav-link" href="analytics.html">Analytics</a></li>
                        <li class="nav-item"><a class="nav-link" href="voice.html">Voice Talk</a></li>
                        <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                    </ul>
                    <button onclick="logout()" class="btn btn-outline-light">Logout</button>
                </div>
            </div>
        </nav>
    </header>

<main>
    <section class="container py-4" style="max-width: 760px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="h4 mb-3">Ask Aspirely</h2>
                <div id="chatBox" class="border rounded p-3 mb-3" style="height:320px; overflow:auto"></div>
                <div class="d-flex gap-2 mb-3 flex-wrap">
                    <button class="btn btn-outline-secondary btn-sm chip" data-msg="What roles fit my JavaScript skills?">JS roles</button>
                    <button class="btn btn-outline-secondary btn-sm chip" data-msg="How to become a data scientist?">Data Science path</button>
                    <button class="btn btn-outline-secondary btn-sm chip" data-msg="Recommend jobs in Bengaluru">Jobs in BLR</button>
                </div>
                <div class="input-group">
                    <input id="userMessage" type="text" class="form-control" placeholder="Type your message...">
                    <button class="btn btn-info text-white" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </section>
</main>

<footer class="py-4 bg-dark text-white-50 mt-auto">
    <div class="container d-flex justify-content-center align-items-center">&copy; 2025 Aspirely. All rights reserved.</div>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/chat.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  // Convert added messages to Bootstrap styled alerts-like rows
  const origAppend = window.appendMessage;
  window.appendMessage = function(sender, text){
    const chatBox = document.getElementById('chatBox');
    const wrapper = document.createElement('div');
    wrapper.className = sender === 'You' ? 'p-2 mb-2 bg-info-subtle rounded' : 'p-2 mb-2 bg-light rounded';
    wrapper.innerHTML = `<strong>${sender}:</strong> ${text}`;
    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
  };
});
</script>
<script>
// preload dummy conversation
window.addEventListener('DOMContentLoaded', () => {
    appendMessage('Aspirely', 'Hi there! I\'m your AI career guide.');
    appendMessage('Aspirely', 'Ask me about roles, skills, or courses.');
    document.querySelectorAll('.chat-suggestions .chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.getElementById('userMessage').value = chip.dataset.msg;
            sendMessage();
        });
    });
});
</script>
</body>
</html>
