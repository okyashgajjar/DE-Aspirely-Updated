<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Assistant - Aspirely</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/custom.css" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/images/logo.png">

<style>
/* Scoped styles for voice UI */
.voice-hero{ min-height: calc(100vh - 160px); display:flex; align-items:center; }
.mic-btn{ width:112px; height:112px; border-radius:50%; border:0; color:#fff; background:#6c63ff; box-shadow:0 .75rem 1.5rem rgba(108,99,255,.25); display:inline-flex; align-items:center; justify-content:center; }
.mic-btn:active{ transform:scale(.98); }
.mic-icon{ width:42px; height:42px; }
.wave-wrap{ height:72px; display:flex; align-items:flex-end; justify-content:center; gap:6px; margin-top:24px; }
.wave-bar{ width:5px; background:#6c63ff; opacity:.85; border-radius:3px; height:12px; transform-origin:50% 100%; animation:voice-wave 1.2s ease-in-out infinite; animation-play-state:paused; }
.listening .wave-bar{ animation-play-state:running; }
@keyframes voice-wave{ 0%,100%{ transform:scaleY(.3);} 50%{ transform:scaleY(1);} }
.transcript{ min-height:84px; }
</style>
</head>
<body class="d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-glass fixed-top">
            <div class="container">
                <a class="navbar-brand fw-bold d-flex align-items-center" href="dashboard.html">Aspirely<span class="brand-dot"></span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navDash" aria-controls="navDash" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navDash">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="chat.html">AI Chatbot</a></li>
                        <li class="nav-item"><a class="nav-link" href="recommendations.html">Jobs</a></li>
                        <li class="nav-item"><a class="nav-link" href="analytics.html">Analytics</a></li>
                        <li class="nav-item"><a class="nav-link active" href="voice.html">Voice Talk</a></li>
                        <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                    </ul>
                    <button onclick="logout()" class="btn btn-outline-light">Logout</button>
                </div>
            </div>
        </nav>
    </header>

<main>
    <section class="container voice-hero py-5">
        <div class="w-100 d-flex flex-column align-items-center text-center">
            <button id="micButton" class="mic-btn" aria-label="Toggle voice">
                <!-- Mic SVG icon -->
                <svg class="mic-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 14a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v4a3 3 0 0 0 3 3z" fill="currentColor"/>
                    <path d="M5 11a1 1 0 1 0-2 0 9 9 0 0 0 8 8v3h2v-3a9 9 0 0 0 8-8 1 1 0 1 0-2 0 7 7 0 0 1-14 0z" fill="currentColor"/>
                </svg>
            </button>
            <div id="waveContainer" class="wave-wrap" aria-hidden="true"></div>
            <p class="text-secondary mt-3 mb-4" id="hintText">Tap the mic and start speaking</p>

            <div class="text-start w-100" style="max-width:720px;">
                <h3 class="h6">Transcript</h3>
                <div id="transcriptText" class="transcript border rounded p-3 bg-white"></div>
            </div>
        </div>
    </section>
</main>

<footer class="py-12 bg-dark text-white-50 mt-auto">
    <div class="container d-flex justify-content-center align-items-center">&copy; 2025 Aspirely. All rights reserved.</div>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/voice.js"></script>
</body>
</html>
